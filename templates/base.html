{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sound Foundation Edtech Academy - Learn Coding, Web Development, AI/ML, Data Analysis, and Digital Marketing">
  <meta name="keywords" content="coding, web development, UI/UX design, data analysis, AI, machine learning, digital marketing">
  <meta name="author" content="Sound Foundation Edtech Academy">

  <title>{% block title %}Sound Foundation Edtech Academy - Learn Tech Skills{% endblock %}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{% static 'assets/logo.svg' %}">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <!-- Icons (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-papVq7X1s6w0Y8qGd8wQwXK9s5Gq9Q1M1KQ1s5e4y7f1l2Q9Y0J1c6Z0k3Y2t4Z0" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  {% block extra_css %}
  <!-- Additional CSS can be added by child templates -->
  {% endblock %}
</head>
<body>
  <!-- Navigation Bar -->
  {% include 'includes/nav-bar/nav.html' %}

  <!-- Main Content -->
  <main>
    {% block content %}
    <!-- Content from child templates will be inserted here -->
    {% endblock %}
  </main>

  <!-- JavaScript -->
  <script src="{% static 'js/main.js' %}"></script>
  
  {% block extra_js %}
  <!-- Additional JavaScript can be added by child templates -->
  {% endblock %}
</body>
</html>
